name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Format, lint, type-check, and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        # Include the `research` extra (torch, transformers, huggingface_hub)
        # so type-checking and tests run against the same environment as the
        # local pre-commit gate — without the ML deps installed, mypy can't find
        # their stubs and fails on modules that are only imported at runtime.
        # UV_TORCH_BACKEND=cpu selects the CPU torch wheels (the tests are
        # CPU-only) instead of the multi-GB default CUDA build.
        env:
          UV_TORCH_BACKEND: cpu
        run: uv sync --group dev --extra research

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type-check
        run: uv run mypy src tests

      - name: Test
        run: uv run pytest -q

      - name: Build reports
        run: |
          uv run --group dev sfora report-build \
            --output /tmp/sfora-report.md \
            --hf-card-output /tmp/sfora-hf.md
          uv run --group dev sfora report-site \
            --output /tmp/sfora-site/index.html
          test -s /tmp/sfora-report.md
          test -s /tmp/sfora-hf.md
          test -s /tmp/sfora-site/index.html

  site:
    name: Build Astro site + e2e
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Astro requires Node >=22.12.0; 20 fails the build.
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build the site
        # Regenerates ../reports/site from source (catches Astro build errors); the
        # e2e step then serves and tests that fresh output.
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npx playwright test
